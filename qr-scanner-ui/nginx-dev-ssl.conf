worker_processes 1;
pid /run/nginx-dev-ssl.pid;
error_log /var/log/nginx/qr-scanner-dev-error.log notice;

events {
  worker_connections 1024;
}

http {
  access_log /var/log/nginx/qr-scanner-dev-access.log;

  map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
  }

  server {
    listen 443 ssl;
    listen [::]:443 ssl;
    listen 8443 ssl;
    listen [::]:8443 ssl;
    server_name _;

    ssl_certificate /home/alphan/Desktop/Deamon-ui/qr-scanner-ui/ssl/cert.pem;
    ssl_certificate_key /home/alphan/Desktop/Deamon-ui/qr-scanner-ui/ssl/key.pem;
    ssl_session_timeout 1d;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    client_max_body_size 120m;

    # Keep access inside private/company networks.
    allow 127.0.0.1;
    allow 10.0.0.0/8;
    allow 172.16.0.0/12;
    allow 192.168.0.0/16;
    deny all;

    location /api/ {
      proxy_pass http://127.0.0.1:8095;
      proxy_http_version 1.1;
      proxy_set_header Host 127.0.0.1;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
      proxy_set_header X-Forwarded-Host $host;
      proxy_read_timeout 300s;
      proxy_send_timeout 300s;
    }

    location = / {
      return 403;
    }

    location ~ ^/(home|bireysel-kredi|kurumsal-kredi)(/|$) {
      return 403;
    }

    location / {
      proxy_pass http://127.0.0.1:5173;
      proxy_http_version 1.1;
      proxy_set_header Host localhost;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
      proxy_set_header X-Forwarded-Host $host;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_read_timeout 300s;
      proxy_send_timeout 300s;
    }
  }
}
